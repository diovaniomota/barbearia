<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Agende seu horário na Toni Dinis Barbearia.">

  <!-- Cor da barra do navegador / tema PWA -->
  <meta name="theme-color" content="#080808">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TD Barbearia">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TD Barbearia</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; height: 100%; background: #080808; }
    /* Splash de boot: feedback imediato enquanto o Flutter carrega.
       Removido pelo evento flutter-first-frame quando o app monta. */
    #boot {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 18px; box-sizing: border-box;
      padding: 24px 32px;
      background: #080808; font-family: sans-serif;
    }
    #boot img { width: 110px; height: 110px; border-radius: 50%; }
    #boot .native-choice {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 12px;
    }
    #boot .native-choice h1 {
      margin: 14px 0 0; color: #F0EDE8; text-align: center;
      font-size: 24px; line-height: 1.25; font-weight: 800;
    }
    #boot .native-choice p {
      margin: -4px 0 20px; color: rgba(240, 237, 232, 0.42);
      text-align: center; font-size: 14px;
    }
    #boot .native-choice .iab-note {
      display: none; margin: -8px 0 12px; color: rgba(240, 237, 232, 0.72);
      text-align: center; font-size: 13px; line-height: 1.35;
    }
    #boot.in-app .native-choice .iab-note { display: block; }
    #boot .native-choice button {
      width: 100%; min-height: 54px; border-radius: 14px;
      font-size: 16px; font-weight: 800; cursor: pointer;
    }
    #boot .native-choice .client {
      border: 0; background: #F5C200; color: #080808;
    }
    #boot .native-choice .admin {
      border: 1.5px solid #F5C200; background: transparent; color: #F5C200;
    }
    #boot .sp {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid #2a2a2a; border-top-color: #F5C200;
      animation: bspin 1s linear infinite;
    }
    @keyframes bspin { to { transform: rotate(360deg); } }
    #boot .msg { color: #9b9b9b; font-size: 14px; }
    #boot.in-app .sp, #boot.in-app .msg { display: none; }
    #boot .err {
      display: none; flex-direction: column; align-items: center;
      gap: 14px; padding: 0 28px; text-align: center;
    }
    #boot .err p { color: #F0EDE8; font-size: 15px; margin: 0; }
    #boot .err small { color: #6b6b6b; font-size: 11px; word-break: break-all; }
    #boot .err button {
      background: #F5C200; color: #080808; border: 0; border-radius: 10px;
      padding: 12px 24px; font-size: 15px; font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="boot">
    <img src="icons/Icon-192.png" alt="TD Barbearia">
    <div class="native-choice">
      <h1>Você é cliente<br>ou admin?</h1>
      <p>Selecione para continuar</p>
      <div class="iab-note">
        No Instagram, abriremos pelo navegador do celular para o agendamento carregar certinho.
      </div>
      <button class="client" type="button" onclick="window.__bootGo('/agendamentocliente', true)">Cliente</button>
      <button class="admin" type="button" onclick="window.__bootGo('/admin')">Admin</button>
    </div>
    <div class="sp"></div>
    <div class="msg">Carregando&hellip;</div>
    <div class="err" id="boot-err">
      <p>N&atilde;o foi poss&iacute;vel carregar o aplicativo.<br>
         Verifique sua conex&atilde;o e tente novamente.</p>
      <small id="boot-err-detail"></small>
      <button onclick="window.__bootRetry()">Tentar novamente</button>
    </div>
  </div>

  <script>
    // Watchdog do boot: se o Flutter não montar, mostra erro com botão de
    // recuperação em vez de deixar o usuário numa tela preta infinita.
    (function () {
      var booted = false;
      var ua = navigator.userAgent || '';
      var inAppBrowser = /Instagram|FBAN|FBAV|FB_IAB|FB4A|FB_IOS|Messenger/i.test(ua);
      function sessionValue(key) {
        try { return sessionStorage.getItem(key); } catch (e) { return null; }
      }
      window.__isInAppBrowser = inAppBrowser;
      window.__keepNativeBoot = inAppBrowser && !sessionValue('tdb-force-inapp-flutter');
      function fullUrl(path) {
        return new URL(path, window.location.origin).toString();
      }
      function externalUrl(path) {
        var url = fullUrl(path);
        if (/Android/i.test(ua)) {
          return 'intent://' + url.replace(/^https?:\/\//, '') +
            '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=' +
            encodeURIComponent(url) + ';end';
        }
        return url;
      }
      window.__bootExternalUrl = externalUrl;
      if (inAppBrowser) {
        var boot = document.getElementById('boot');
        if (boot) boot.className = (boot.className ? boot.className + ' ' : '') + 'in-app';
      }
      function errorText(error) {
        if (!error) return 'Erro ao carregar o aplicativo.';
        if (typeof error === 'string') return error;
        if (error.message) return error.message;
        return String(error);
      }
      function clearCachesAndWorkers() {
        var cachesCleared = window.caches
          ? caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            })
          : Promise.resolve();
        var swUnregistered = ('serviceWorker' in navigator)
          ? navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            })
          : Promise.resolve();
        return Promise.all([
          cachesCleared.catch(function () {}),
          swUnregistered.catch(function () {})
        ]);
      }
      window.__clearAppCachesAndWorkers = clearCachesAndWorkers;
      window.addEventListener('flutter-first-frame', function () {
        if (window.__keepNativeBoot) return;
        booted = true;
        var b = document.getElementById('boot');
        if (b && b.parentNode) b.parentNode.removeChild(b);
      });
      function showError(detail) {
        if (booted) return;
        var sp = document.querySelector('#boot .sp');
        var msg = document.querySelector('#boot .msg');
        if (sp) sp.style.display = 'none';
        if (msg) msg.style.display = 'none';
        var err = document.getElementById('boot-err');
        if (err) err.style.display = 'flex';
        if (detail) {
          var d = document.getElementById('boot-err-detail');
          if (d) d.textContent = detail;
        }
      }
      window.__bootShowError = showError;
      window.__bootGo = function (path, clearSession) {
        try {
          sessionStorage.removeItem('sw-cleaned');
          sessionStorage.removeItem('tdb-sw-cleaned-v2');
        } catch (e) {}
        if (clearSession) {
          try {
            localStorage.removeItem('sb-uebvtbgvsyzbyzdilren-auth-token');
          } catch (e) {}
        }
        if (window.__keepNativeBoot) {
          var note = document.querySelector('#boot .native-choice .iab-note');
          if (note) {
            note.textContent = 'Tentando abrir no navegador. Se não abrir, toque nos três pontinhos do Instagram e escolha abrir no navegador.';
          }
          window.location.assign(externalUrl(path));
          return;
        }
        window.location.assign(path);
      };
      window.__bootRetry = function () {
        try {
          sessionStorage.removeItem('sw-cleaned');
          sessionStorage.removeItem('tdb-sw-cleaned-v2');
        } catch (e) {}
        try {
          localStorage.removeItem('sb-uebvtbgvsyzbyzdilren-auth-token');
        } catch (e) {}
        function go() { window.location.reload(); }
        try { clearCachesAndWorkers().then(go, go); } catch (e) { go(); }
      };
      // Erro de script do PRÓPRIO app durante o boot (ex: navegador antigo).
      // Filtra por origem para ignorar erros de extensões do navegador.
      window.addEventListener('error', function (ev) {
        if (booted || !ev || !ev.filename) return;
        if (ev.filename.indexOf(window.location.origin) !== 0) return;
        showError(ev.message || 'Erro ao carregar o script.');
      });
      window.addEventListener('unhandledrejection', function (ev) {
        if (booted || !ev) return;
        showError(errorText(ev.reason));
      });
      // Rede de segurança: 25s sem montar = mostra o erro. Se o app montar
      // depois disso (conexão lenta), o first-frame remove tudo mesmo assim.
      setTimeout(function () {
        showError('Tempo esgotado - conexão lenta ou indisponível.');
      }, 25000);
    })();
  </script>
  <script>
    // Limpeza automática de versões antigas: desregistra o service worker
    // e apaga os caches locais ao abrir. Clientes que ficaram presos numa
    // versão velha (app travado, botões mortos) são recarregados uma única
    // vez e passam a receber sempre a versão atual direto da rede.
    {{flutter_js}}
    {{flutter_build_config}}
    // CanvasKit servido pelo próprio domínio — o CDN gstatic.com é bloqueado
    // em algumas operadoras/DNS e o app trava no splash sem isso.
    // Sem serviceWorkerSettings: o app carrega sempre da rede (atualização
    // imediata a cada deploy, sem cache de versão antiga).
    // renderer: "canvaskit" força o renderizador maduro/compatível e desativa
    // o skwasm (experimental, exige SharedArrayBuffer/cross-origin isolation
    // que WebViews como o do Instagram não têm — causava travar só na logo).
    (function () {
      function safeSessionGet(key) {
        try { return sessionStorage.getItem(key); } catch (e) { return null; }
      }
      function safeSessionSet(key, value) {
        try { sessionStorage.setItem(key, value); } catch (e) {}
      }
      function withTimeout(promise, ms) {
        return new Promise(function (resolve) {
          var done = false;
          var timer = setTimeout(function () {
            if (done) return;
            done = true;
            resolve(false);
          }, ms);
          promise.then(function () {
            if (done) return;
            done = true;
            clearTimeout(timer);
            resolve(true);
          }, function () {
            if (done) return;
            done = true;
            clearTimeout(timer);
            resolve(false);
          });
        });
      }
      function hasWebGl() {
        try {
          var canvas = document.createElement('canvas');
          return !!(
            (window.WebGL2RenderingContext && canvas.getContext('webgl2')) ||
            (window.WebGLRenderingContext && (
              canvas.getContext('webgl') ||
              canvas.getContext('experimental-webgl')
            ))
          );
        } catch (e) {
          return false;
        }
      }
      function loadFlutterApp() {
        if (window.__keepNativeBoot) {
          return;
        }
        if (!window.WebAssembly) {
          if (window.__bootShowError) {
            window.__bootShowError('Este navegador não tem WebAssembly habilitado.');
          }
          return;
        }
        var config = {
          renderer: "canvaskit",
          canvasKitBaseUrl: "canvaskit/",
          canvasKitVariant: "full"
        };
        if (!hasWebGl()) {
          config.canvasKitForceCpuOnly = true;
        }
        try {
          var loading = _flutter.loader.load({ config: config });
          if (loading && typeof loading.catch === 'function') {
            loading.catch(function (error) {
              if (window.__bootShowError) {
                window.__bootShowError(error && error.message ? error.message : String(error));
              }
            });
          }
        } catch (error) {
          if (window.__bootShowError) {
            window.__bootShowError(error && error.message ? error.message : String(error));
          }
        }
      }
      function reloadOnceIfControlled(wasControlled) {
        if (!wasControlled || safeSessionGet('tdb-sw-cleaned-v2') === '1') {
          return false;
        }
        safeSessionSet('tdb-sw-cleaned-v2', '1');
        window.location.reload();
        return true;
      }

      var wasControlled = !!(
        navigator.serviceWorker &&
        navigator.serviceWorker.controller
      );
      var cleanup = window.__clearAppCachesAndWorkers
        ? window.__clearAppCachesAndWorkers()
        : Promise.resolve();

      withTimeout(cleanup, 1800).then(function () {
        if (!reloadOnceIfControlled(wasControlled)) {
          loadFlutterApp();
        }
      });
    })();
  </script>
</body>
</html>
