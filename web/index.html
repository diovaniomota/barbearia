<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Agende seu horário na Toni Dinis Barbearia.">

  <!-- Cor da barra do navegador / tema PWA -->
  <meta name="theme-color" content="#080808">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TD Barbearia">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TD Barbearia</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}
    // CanvasKit servido pelo próprio domínio — o CDN gstatic.com é bloqueado
    // em algumas operadoras/DNS e o app trava no splash sem isso.
    _flutter.loader.load({
      config: { canvasKitBaseUrl: "canvaskit/" }
    });
  </script>
</body>
</html>
